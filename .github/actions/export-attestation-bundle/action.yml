name: Export Attestation Bundle
description: Download a GitHub artifact attestation bundle and trusted root for offline verification.

inputs:
  artifact-path:
    description: Path to the local artifact binary whose attestation should be downloaded.
    required: true
  target-dir:
    description: Directory where the attestation bundle and trusted root should be written.
    required: false
    default: provenance

runs:
  using: composite
  steps:
    - name: Export binary attestation bundle
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        mkdir -p "${{ inputs.target-dir }}"
        artifact_path="$(realpath "${{ inputs.artifact-path }}")"
        (
          cd "${{ inputs.target-dir }}"
          gh attestation download "${artifact_path}" -R "${{ github.repository }}"
        )
        attestation_bundle="$(find "${{ inputs.target-dir }}" -maxdepth 1 -type f -name 'sha256*.jsonl' | head -1)"
        test -n "${attestation_bundle}" || {
          echo "failed to download attestation bundle"
          exit 1
        }
        mv "${attestation_bundle}" "${{ inputs.target-dir }}/herakles-node-exporter-attestation.jsonl"

    - name: Export trusted root for offline verification
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        gh attestation trusted-root > "${{ inputs.target-dir }}/trusted_root.jsonl"
