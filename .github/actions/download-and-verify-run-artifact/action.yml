name: Download And Verify Run Artifact
description: Download release artifacts and verify their SHA-256 checksums.

inputs:
  artifact-pattern:
    description: Glob pattern for the uploaded artifact bundles.
    required: true
  sha-map-file:
    description: JSON file mapping target suffixes to expected SHA-256 digests.
    required: true
  target-dir:
    description: Directory where the artifact should be downloaded.
    required: false
    default: release

runs:
  using: composite
  steps:
    - name: Download run artifact
      uses: actions/download-artifact@v4
      with:
        pattern: ${{ inputs.artifact-pattern }}
        path: ${{ inputs.target-dir }}
        merge-multiple: "true"

    - name: Verify artifact checksums
      shell: bash
      run: |
        set -euo pipefail
        cd "${{ inputs.target-dir }}"
        sha_map_file="${{ inputs.sha-map-file }}"
        found=0
        for target in $(jq -r 'keys[]' "${sha_map_file}"); do
          expected_sha="$(jq -r --arg target "${target}" '.[$target] // empty' "${sha_map_file}")"
          test -n "${expected_sha}" || {
            echo "missing artifact sha for ${target}"
            exit 1
          }
          actual_sha="$(sha256sum "herakles-node-exporter-${target}" | awk '{print $1}')"
          test "${actual_sha}" = "${expected_sha}" || {
            echo "artifact sha mismatch for ${target}"
            echo "expected: ${expected_sha}"
            echo "actual:   ${actual_sha}"
            exit 1
          }
          found=1
        done
        test "${found}" -eq 1 || {
          echo "no release artifacts found"
          exit 1
        }
