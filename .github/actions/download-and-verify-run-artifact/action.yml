name: Download And Verify Run Artifact
description: Download a run artifact and verify a file inside it against the expected SHA-256.

inputs:
  artifact-name:
    description: Name of the uploaded artifact bundle.
    required: true
  target-dir:
    description: Directory where the artifact should be downloaded.
    required: false
    default: dist
  file-path:
    description: Relative path to the file inside target-dir that should be verified.
    required: true
  expected-sha256:
    description: Optional expected SHA-256 digest of the file being verified.
    required: false
    default: ""
  checksum-file:
    description: Optional relative path to a checksum file inside target-dir for an additional sha256sum -c check.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Download run artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.target-dir }}

    - name: Verify artifact checksum
      shell: bash
      run: |
        set -euo pipefail
        actual_sha256="$(sha256sum "${{ inputs.target-dir }}/${{ inputs.file-path }}" | awk '{print $1}')"
        expected_sha256="${{ inputs.expected-sha256 }}"
        if [ -n "${expected_sha256}" ]; then
          test "${actual_sha256}" = "${expected_sha256}" || {
            echo "artifact sha256 mismatch"
            echo "expected: ${expected_sha256}"
            echo "actual:   ${actual_sha256}"
            exit 1
          }
        fi
        if [ -n "${{ inputs.checksum-file }}" ]; then
          (
            cd "${{ inputs.target-dir }}"
            sha256sum -c "${{ inputs.checksum-file }}"
          )
        fi
