name: Lint Autofix

on:
  push:
    branches:
      - main
  schedule:
    - cron: "19 4 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: How to apply autofixes
        required: true
        default: pull_request
        type: choice
        options:
          - pull_request
          - commit
      fail-on-warnings:
        description: Fail if warnings remain after autofix
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    runs-on: ubuntu-latest
    env:
      AUTOFIX_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'pull_request' }}
      FAIL_ON_WARNINGS: ${{ github.event_name == 'workflow_dispatch' && inputs['fail-on-warnings'] || 'false' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Validate mode
        shell: bash
        run: |
          set -euo pipefail
          echo "AUTOFIX_MODE=${AUTOFIX_MODE}"
          echo "FAIL_ON_WARNINGS=${FAIL_ON_WARNINGS}"
          echo "github.ref_name=${{ github.ref_name }}"
          echo "default_branch=${{ github.event.repository.default_branch }}"
          if [[ \
            "${AUTOFIX_MODE}" == "commit" && \
            "${{ github.ref_name }}" == "${{ github.event.repository.default_branch }}" \
          ]]; then
            echo "Refusing to auto-commit directly to the default branch."
            exit 1
          fi

      - name: Run Rust autofix
        id: autofix
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          LOG_FILE="${RUNNER_TEMP}/rust-autofix.log"
          {
            cargo clippy --fix --allow-dirty --allow-staged --lib --bins --examples --no-default-features
            cargo fmt --all
          } 2>&1 | tee "${LOG_FILE}"

      - name: Export Rust autofix log path
        if: always()
        id: autofix_log
        run: echo "log_file=${RUNNER_TEMP}/rust-autofix.log" >> "${GITHUB_OUTPUT}"

      - name: Run Markdown autofix
        id: markdown_autofix
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          LOG_FILE="${RUNNER_TEMP}/markdown-autofix.log"
          {
            npx markdownlint-cli2 --fix "**/*.md" "#target/**"
          } 2>&1 | tee "${LOG_FILE}"

      - name: Export Markdown autofix log path
        if: always()
        id: markdown_autofix_log
        run: echo "log_file=${RUNNER_TEMP}/markdown-autofix.log" >> "${GITHUB_OUTPUT}"

      - name: Detect changes
        id: changes
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            echo "has_changes=false"
          else
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
            echo "has_changes=true"
          fi

      - name: Build PR body
        id: pr_body
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          BODY_FILE="${RUNNER_TEMP}/autofix-pr-body.md"
          RUST_LOG_FILE="${{ steps.autofix_log.outputs.log_file }}"
          MARKDOWN_LOG_FILE="${{ steps.markdown_autofix_log.outputs.log_file }}"
          {
            echo "Automated fixes generated by:"
            echo
            echo "- \`cargo clippy --fix --lib --bins --examples --no-default-features\`"
            echo "- \`cargo fmt --all\`"
            echo "- \`npx markdownlint-cli2 --fix \"**/*.md\" \"#target/**\"\`"
            echo
            echo "Run: [${{ github.workflow }} #${{ github.run_number }}]("
            echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo
            echo "<details>"
            echo "<summary>Rust autofix report</summary>"
            echo
            echo '```text'
            if [[ -n "${RUST_LOG_FILE}" && -f "${RUST_LOG_FILE}" ]]; then
              tail -n 500 "${RUST_LOG_FILE}"
            else
              echo "No Rust autofix log was captured."
            fi
            echo '```'
            echo "</details>"
            echo
            echo "<details>"
            echo "<summary>Markdown autofix report</summary>"
            echo
            echo '```text'
            if [[ -n "${MARKDOWN_LOG_FILE}" && -f "${MARKDOWN_LOG_FILE}" ]]; then
              tail -n 500 "${MARKDOWN_LOG_FILE}"
            else
              echo "No Markdown autofix log was captured."
            fi
            echo '```'
            echo "</details>"
          } > "${BODY_FILE}"
          echo "body_file=${BODY_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Commit autofixes to branch
        if: >-
          always() && steps.changes.outputs.has_changes == 'true' &&
          env.AUTOFIX_MODE == 'commit'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply lint autofixes"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Create autofix PR
        if: >-
          always() && steps.changes.outputs.has_changes == 'true' &&
          env.AUTOFIX_MODE == 'pull_request'
        uses: peter-evans/create-pull-request@v8
        with:
          # Keep the branch name stable so repeated runs update the same autofix PR.
          branch: lint-autofix/${{ github.ref_name }}
          delete-branch: true
          commit-message: "Apply lint autofixes"
          title: "Apply lint autofixes for ${{ github.ref_name }}"
          body-path: ${{ steps.pr_body.outputs.body_file }}

      - name: Close stale autofix PR
        if: >-
          always() && steps.changes.outputs.has_changes != 'true' &&
          env.AUTOFIX_MODE == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          AUTOFIX_BRANCH: lint-autofix/${{ github.ref_name }}
        run: |
          set -euo pipefail
          pr_number="$(
            gh pr list \
              --repo "${{ github.repository }}" \
              --head "${AUTOFIX_BRANCH}" \
              --base "${{ github.ref_name }}" \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [[ -z "${pr_number}" ]]; then
            echo "No open autofix PR to close for ${AUTOFIX_BRANCH}."
            exit 0
          fi

          gh pr close "${pr_number}" \
            --repo "${{ github.repository }}" \
            --delete-branch \
            --comment \
            "Closing stale autofix PR because the latest lint-autofix run produced no changes."

      - name: Report no changes
        if: always() && steps.changes.outputs.has_changes != 'true'
        run: echo "No autofixes were produced."

      - name: Verify remaining warnings
        if: always() && env.FAIL_ON_WARNINGS == 'true'
        run: |
          cargo clippy --all-targets --no-default-features -- -D warnings
          npx markdownlint-cli2 "**/*.md" "#target/**"

      - name: Fail if autofix commands crashed
        if: |
          always() &&
          steps.changes.outputs.has_changes != 'true' &&
          (
            steps.autofix.outcome == 'failure' ||
            steps.markdown_autofix.outcome == 'failure'
          )
        run: |
          echo "Autofix failed before producing any changes."
          exit 1
