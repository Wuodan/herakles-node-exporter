name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/test-build.yml
    permissions:
      contents: read
      attestations: write
      id-token: write
    with:
      upload-release-binary: true

  build-and-release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download and verify tested amd64 glibc binary
        uses: ./.github/actions/download-and-verify-run-artifact
        with:
          artifact-name: herakles-node-exporter-release-binary-x86_64-linux-gnu
          target-dir: dist/x86_64-linux-gnu
          file-path: herakles-node-exporter
          expected-sha256: ${{ needs.ci.outputs.release-binary-sha256-x86_64-linux-gnu }}
          checksum-file: herakles-node-exporter.sha256

      - name: Download and verify tested amd64 musl binary
        uses: ./.github/actions/download-and-verify-run-artifact
        with:
          artifact-name: herakles-node-exporter-release-binary-x86_64-linux-musl
          target-dir: dist/x86_64-linux-musl
          file-path: herakles-node-exporter
          expected-sha256: ${{ needs.ci.outputs.release-binary-sha256-x86_64-linux-musl }}
          checksum-file: herakles-node-exporter.sha256

      - name: Download and verify tested arm64 glibc binary
        uses: ./.github/actions/download-and-verify-run-artifact
        with:
          artifact-name: herakles-node-exporter-release-binary-aarch64-linux-gnu
          target-dir: dist/aarch64-linux-gnu
          file-path: herakles-node-exporter
          expected-sha256: ${{ needs.ci.outputs.release-binary-sha256-aarch64-linux-gnu }}
          checksum-file: herakles-node-exporter.sha256

      - name: Download and verify tested arm64 musl binary
        uses: ./.github/actions/download-and-verify-run-artifact
        with:
          artifact-name: herakles-node-exporter-release-binary-aarch64-linux-musl
          target-dir: dist/aarch64-linux-musl
          file-path: herakles-node-exporter
          expected-sha256: ${{ needs.ci.outputs.release-binary-sha256-aarch64-linux-musl }}
          checksum-file: herakles-node-exporter.sha256

      - name: Export amd64 glibc attestation bundle
        uses: ./.github/actions/export-attestation-bundle
        with:
          artifact-path: dist/x86_64-linux-gnu/herakles-node-exporter
          target-dir: provenance/x86_64-linux-gnu

      - name: Export amd64 musl attestation bundle
        uses: ./.github/actions/export-attestation-bundle
        with:
          artifact-path: dist/x86_64-linux-musl/herakles-node-exporter
          target-dir: provenance/x86_64-linux-musl

      - name: Export arm64 glibc attestation bundle
        uses: ./.github/actions/export-attestation-bundle
        with:
          artifact-path: dist/aarch64-linux-gnu/herakles-node-exporter
          target-dir: provenance/aarch64-linux-gnu

      - name: Export arm64 musl attestation bundle
        uses: ./.github/actions/export-attestation-bundle
        with:
          artifact-path: dist/aarch64-linux-musl/herakles-node-exporter
          target-dir: provenance/aarch64-linux-musl

      - name: Rename provenance assets for release
        run: |
          set -euo pipefail
          mv provenance/x86_64-linux-gnu/herakles-node-exporter-attestation.jsonl provenance/herakles-node-exporter-x86_64-linux-gnu-attestation.jsonl
          mv provenance/x86_64-linux-musl/herakles-node-exporter-attestation.jsonl provenance/herakles-node-exporter-x86_64-linux-musl-attestation.jsonl
          mv provenance/aarch64-linux-gnu/herakles-node-exporter-attestation.jsonl provenance/herakles-node-exporter-aarch64-linux-gnu-attestation.jsonl
          mv provenance/aarch64-linux-musl/herakles-node-exporter-attestation.jsonl provenance/herakles-node-exporter-aarch64-linux-musl-attestation.jsonl
          cp provenance/x86_64-linux-gnu/trusted_root.jsonl provenance/herakles-node-exporter-trusted-root.jsonl

      - name: Package binaries
        run: |
          cp dist/x86_64-linux-gnu/herakles-node-exporter herakles-node-exporter-x86_64-linux-gnu
          cp dist/x86_64-linux-musl/herakles-node-exporter herakles-node-exporter-x86_64-linux-musl
          cp dist/aarch64-linux-gnu/herakles-node-exporter herakles-node-exporter-aarch64-linux-gnu
          cp dist/aarch64-linux-musl/herakles-node-exporter herakles-node-exporter-aarch64-linux-musl
          sed \
            -e 's/^REPO_OWNER=.*/REPO_OWNER="${{ github.repository_owner }}"/' \
            -e 's/^REPO_NAME=.*/REPO_NAME="${{ github.event.repository.name }}"/' \
            scripts/install.sh > install.sh
          chmod +x herakles-node-exporter-x86_64-linux-gnu herakles-node-exporter-x86_64-linux-musl herakles-node-exporter-aarch64-linux-gnu herakles-node-exporter-aarch64-linux-musl
          chmod +x install.sh
          tar -czf herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-gnu.tar.gz herakles-node-exporter-x86_64-linux-gnu
          tar -czf herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-musl.tar.gz herakles-node-exporter-x86_64-linux-musl
          tar -czf herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-gnu.tar.gz herakles-node-exporter-aarch64-linux-gnu
          tar -czf herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-musl.tar.gz herakles-node-exporter-aarch64-linux-musl
          sha256sum herakles-node-exporter-x86_64-linux-gnu > herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-gnu.sha256
          sha256sum herakles-node-exporter-x86_64-linux-musl > herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-musl.sha256
          sha256sum herakles-node-exporter-aarch64-linux-gnu > herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-gnu.sha256
          sha256sum herakles-node-exporter-aarch64-linux-musl > herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-musl.sha256
          sha256sum herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-gnu.tar.gz > herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-gnu.tar.gz.sha256
          sha256sum herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-musl.tar.gz > herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-musl.tar.gz.sha256
          sha256sum herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-gnu.tar.gz > herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-gnu.tar.gz.sha256
          sha256sum herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-musl.tar.gz > herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-musl.tar.gz.sha256

      - name: Build distro packages
        run: |
          set -euo pipefail
          cargo install cargo-deb cargo-generate-rpm
          mkdir -p target/release
          cp dist/x86_64-linux-gnu/herakles-node-exporter target/release/herakles-node-exporter
          cargo deb --no-build
          cargo generate-rpm
          cp target/debian/herakles-node-exporter_*.deb herakles-node-exporter-${{ github.ref_name }}-amd64.deb
          cp target/generate-rpm/herakles-node-exporter-*.x86_64.rpm herakles-node-exporter-${{ github.ref_name }}-x86_64.rpm
          sha256sum herakles-node-exporter-${{ github.ref_name }}-amd64.deb > herakles-node-exporter-${{ github.ref_name }}-amd64.deb.sha256
          sha256sum herakles-node-exporter-${{ github.ref_name }}-x86_64.rpm > herakles-node-exporter-${{ github.ref_name }}-x86_64.rpm.sha256

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign amd64 glibc binary with Cosign
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cosign sign-blob \
            --bundle "herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-gnu.sigstore.json" \
            "herakles-node-exporter-x86_64-linux-gnu"

      - name: Sign amd64 musl binary with Cosign
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cosign sign-blob \
            --bundle "herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-musl.sigstore.json" \
            "herakles-node-exporter-x86_64-linux-musl"

      - name: Sign arm64 glibc binary with Cosign
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cosign sign-blob \
            --bundle "herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-gnu.sigstore.json" \
            "herakles-node-exporter-aarch64-linux-gnu"

      - name: Sign arm64 musl binary with Cosign
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cosign sign-blob \
            --bundle "herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-musl.sigstore.json" \
            "herakles-node-exporter-aarch64-linux-musl"

      - name: Sign amd64 glibc tarball with Cosign
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cosign sign-blob \
            --bundle "herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-gnu.tar.gz.sigstore.json" \
            "herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-gnu.tar.gz"

      - name: Sign amd64 musl tarball with Cosign
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cosign sign-blob \
            --bundle "herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-musl.tar.gz.sigstore.json" \
            "herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-musl.tar.gz"

      - name: Sign arm64 glibc tarball with Cosign
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cosign sign-blob \
            --bundle "herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-gnu.tar.gz.sigstore.json" \
            "herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-gnu.tar.gz"

      - name: Sign arm64 musl tarball with Cosign
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cosign sign-blob \
            --bundle "herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-musl.tar.gz.sigstore.json" \
            "herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-musl.tar.gz"

      - name: Sign Debian package with Cosign
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cosign sign-blob \
            --bundle "herakles-node-exporter-${{ github.ref_name }}-amd64.deb.sigstore.json" \
            "herakles-node-exporter-${{ github.ref_name }}-amd64.deb"

      - name: Sign RPM package with Cosign
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cosign sign-blob \
            --bundle "herakles-node-exporter-${{ github.ref_name }}-x86_64.rpm.sigstore.json" \
            "herakles-node-exporter-${{ github.ref_name }}-x86_64.rpm"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            herakles-node-exporter-x86_64-linux-gnu
            herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-gnu.sha256
            herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-gnu.sigstore.json
            herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-gnu.tar.gz
            herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-gnu.tar.gz.sha256
            herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-gnu.tar.gz.sigstore.json
            herakles-node-exporter-x86_64-linux-musl
            herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-musl.sha256
            herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-musl.sigstore.json
            herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-musl.tar.gz
            herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-musl.tar.gz.sha256
            herakles-node-exporter-${{ github.ref_name }}-x86_64-linux-musl.tar.gz.sigstore.json
            herakles-node-exporter-aarch64-linux-gnu
            herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-gnu.sha256
            herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-gnu.sigstore.json
            herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-gnu.tar.gz
            herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-gnu.tar.gz.sha256
            herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-gnu.tar.gz.sigstore.json
            herakles-node-exporter-aarch64-linux-musl
            herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-musl.sha256
            herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-musl.sigstore.json
            herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-musl.tar.gz
            herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-musl.tar.gz.sha256
            herakles-node-exporter-${{ github.ref_name }}-aarch64-linux-musl.tar.gz.sigstore.json
            herakles-node-exporter-${{ github.ref_name }}-amd64.deb
            herakles-node-exporter-${{ github.ref_name }}-amd64.deb.sha256
            herakles-node-exporter-${{ github.ref_name }}-amd64.deb.sigstore.json
            herakles-node-exporter-${{ github.ref_name }}-x86_64.rpm
            herakles-node-exporter-${{ github.ref_name }}-x86_64.rpm.sha256
            herakles-node-exporter-${{ github.ref_name }}-x86_64.rpm.sigstore.json
            install.sh
            provenance/herakles-node-exporter-x86_64-linux-gnu-attestation.jsonl
            provenance/herakles-node-exporter-x86_64-linux-musl-attestation.jsonl
            provenance/herakles-node-exporter-aarch64-linux-gnu-attestation.jsonl
            provenance/herakles-node-exporter-aarch64-linux-musl-attestation.jsonl
            provenance/herakles-node-exporter-trusted-root.jsonl
