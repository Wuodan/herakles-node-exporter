name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/test-build.yml
    permissions:
      contents: read
      attestations: write
      id-token: write
    with:
      release-version: ${{ github.ref_name }}

  release-with-artifacts:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Write release SHA map
        run: |
          set -euo pipefail
          cat > release-shas.json <<EOF
          {
            "x86_64-linux-gnu": "${{ needs.ci.outputs.release-binary-sha256-x86_64-linux-gnu }}",
            "x86_64-linux-musl": "${{ needs.ci.outputs.release-binary-sha256-x86_64-linux-musl }}",
            "aarch64-linux-gnu": "${{ needs.ci.outputs.release-binary-sha256-aarch64-linux-gnu }}",
            "aarch64-linux-musl": "${{ needs.ci.outputs.release-binary-sha256-aarch64-linux-musl }}"
          }
          EOF

      - name: Download and verify tested release binaries
        uses: ./.github/actions/download-and-verify-run-artifact
        with:
          artifact-pattern: herakles-node-exporter-release-binary-*
          sha-map-file: release-shas.json
          target-dir: release

      - name: Package binaries
        run: |
          set -euo pipefail
          for target in $(jq -r 'keys[]' release-shas.json); do
            chmod +x "release/herakles-node-exporter-${target}"
            tar -czf "release/herakles-node-exporter-${{ github.ref_name }}-${target}.tar.gz" \
              -C release "herakles-node-exporter-${target}"
            sha256sum "release/herakles-node-exporter-${target}" \
              > "release/herakles-node-exporter-${{ github.ref_name }}-${target}.sha256"
            sha256sum "release/herakles-node-exporter-${{ github.ref_name }}-${target}.tar.gz" \
              > "release/herakles-node-exporter-${{ github.ref_name }}-${target}.tar.gz.sha256"
          done

      - name: Export provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p release/provenance
          gh attestation trusted-root > release/provenance/herakles-node-exporter-trusted-root.jsonl
          for target in $(jq -r 'keys[]' release-shas.json); do
            scripts/download-attestation-bundle.sh \
              "dist/${target}/herakles-node-exporter" \
              "release/provenance/herakles-node-exporter-${target}-attestation.jsonl"
          done

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign release assets with Cosign
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cd release
          for target in $(jq -r 'keys[]' ../release-shas.json); do
            cosign sign-blob \
              --bundle "herakles-node-exporter-${{ github.ref_name }}-${target}.sigstore.json" \
              "herakles-node-exporter-${target}"
            cosign sign-blob \
              --bundle "herakles-node-exporter-${{ github.ref_name }}-${target}.tar.gz.sigstore.json" \
              "herakles-node-exporter-${{ github.ref_name }}-${target}.tar.gz"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          working_directory: release
          generate_release_notes: true
          files: |
            herakles-node-exporter*
            provenance/*.jsonl
