name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/test-build.yml
    with:
      upload-release-binary: true

  build-and-release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download and verify tested release binary
        uses: ./.github/actions/download-and-verify-run-artifact
        with:
          artifact-name: herakles-node-exporter-release-binary
          target-dir: dist
          file-path: herakles-node-exporter
          expected-sha256: ${{ needs.ci.outputs.release-binary-sha256 }}
          checksum-file: herakles-node-exporter.sha256

      - name: Export attestation bundle
        uses: ./.github/actions/export-attestation-bundle
        with:
          artifact-path: dist/herakles-node-exporter
          target-dir: provenance

      - name: Package binary
        run: |
          cp dist/herakles-node-exporter herakles-node-exporter
          chmod +x herakles-node-exporter
          tar -czf herakles-node-exporter-${{ github.ref_name }}-x86_64-linux.tar.gz herakles-node-exporter
          sha256sum herakles-node-exporter-${{ github.ref_name }}-x86_64-linux.tar.gz > herakles-node-exporter-${{ github.ref_name }}-x86_64-linux.tar.gz.sha256
          sha256sum herakles-node-exporter > herakles-node-exporter-${{ github.ref_name }}-x86_64-linux.sha256

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4

      - name: Sign release binary with Cosign
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cosign sign-blob \
            --bundle "herakles-node-exporter-${{ github.ref_name }}-x86_64-linux.sigstore.json" \
            "herakles-node-exporter"

      - name: Sign release tarball with Cosign
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cosign sign-blob \
            --bundle "herakles-node-exporter-${{ github.ref_name }}-x86_64-linux.tar.gz.sigstore.json" \
            "herakles-node-exporter-${{ github.ref_name }}-x86_64-linux.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            herakles-node-exporter
            herakles-node-exporter-${{ github.ref_name }}-x86_64-linux.sha256
            herakles-node-exporter-${{ github.ref_name }}-x86_64-linux.sigstore.json
            herakles-node-exporter-${{ github.ref_name }}-x86_64-linux.tar.gz
            herakles-node-exporter-${{ github.ref_name }}-x86_64-linux.tar.gz.sha256
            herakles-node-exporter-${{ github.ref_name }}-x86_64-linux.tar.gz.sigstore.json
            provenance/herakles-node-exporter-attestation.jsonl
            provenance/trusted_root.jsonl
