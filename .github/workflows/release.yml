name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/test-build.yml
    permissions:
      contents: read
      attestations: write
      id-token: write
    with:
      upload-release-binaries: true

  release-with-artifacts:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    env:
      EXTRA_BUNDLES: >-
        install.sh
        herakles-node-exporter-dashboard.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Write release SHA map
        run: |
          set -euo pipefail
          # Keep the release target list in one small manifest for later steps.
          cat > release-shas.json <<EOF
          {
            "x86_64-linux-gnu": "${{ needs.ci.outputs.release-binary-sha256-x86_64-linux-gnu }}",
            "x86_64-linux-musl": "${{ needs.ci.outputs.release-binary-sha256-x86_64-linux-musl }}",
            "aarch64-linux-gnu": "${{ needs.ci.outputs.release-binary-sha256-aarch64-linux-gnu }}",
            "aarch64-linux-musl": "${{ needs.ci.outputs.release-binary-sha256-aarch64-linux-musl }}"
          }
          EOF

      - name: Download and verify tested release binaries
        uses: ./.github/actions/download-and-verify-run-artifact
        with:
          artifact-pattern: herakles-node-exporter-release-binary-*
          sha-map-file: release-shas.json
          target-dir: release

      - name: Package binaries
        run: |
          set -euo pipefail
          for target in $(jq -r 'keys[]' release-shas.json); do
            chmod +x "release/herakles-node-exporter-${target}"
          done

      - name: Package install.sh
        run: |
          set -euo pipefail
          cp scripts/install.sh release/install.sh
          sed -i \
            -e 's/^REPO_OWNER=.*/REPO_OWNER="${{ github.repository_owner }}"/' \
            -e 's/^REPO_NAME=.*/REPO_NAME="${{ github.event.repository.name }}"/' \
            release/install.sh

      - name: Generate provenance attestation for install.sh
        uses: actions/attest@v4
        with:
          subject-path: release/install.sh

      - name: Package Grafana dashboard stack to herakles-node-exporter-dashboard.tar.gz
        run: |
          set -euo pipefail
          mkdir -p release/herakles-node-exporter-dashboard
          cp -a \
            docker-compose.yml \
            grafana \
            prometheus \
            release/herakles-node-exporter-dashboard/
          tar -czf release/herakles-node-exporter-dashboard.tar.gz \
            -C release \
            herakles-node-exporter-dashboard
          rm -rf release/herakles-node-exporter-dashboard

      - name: Generate provenance attestation for herakles-node-exporter-dashboard.tar.gz
        uses: actions/attest@v4
        with:
          subject-path: release/herakles-node-exporter-dashboard.tar.gz

      - name: Export provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p release/provenance
          # Export trusted root
          gh attestation trusted-root > release/provenance/herakles-node-exporter.trusted-root.jsonl
          # Export provenance for binaries
          for target in $(jq -r 'keys[]' release-shas.json); do
            bundle="herakles-node-exporter-${target}"
            scripts/download-attestation-bundle.sh \
              "release/${bundle}" \
              "release/provenance/${bundle}.attestation.jsonl"
          done
          # Export provenance for install.sh and herakles-node-exporter-dashboard.tar.gz
          for bundle in ${EXTRA_BUNDLES}; do
            scripts/download-attestation-bundle.sh \
              "release/${bundle}" \
              "release/provenance/${bundle}.attestation.jsonl"
          done

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign release assets with Cosign
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cd release
          mkdir signature
          # Sign binaries
          for target in $(jq -r 'keys[]' ../release-shas.json); do
            bundle="herakles-node-exporter-${target}"
            cosign sign-blob \
              --bundle "signature/${bundle}.sigstore.json" \
              "${bundle}"
          done
          # Sign install.sh and herakles-node-exporter-dashboard.tar.gz
          for bundle in ${EXTRA_BUNDLES}; do
            cosign sign-blob \
              --bundle "signature/${bundle}.sigstore.json" \
              "${bundle}"
          done

      - name: Package SHA256SUMS
        run: |
          set -euo pipefail
          cd release
          sha256sum -- herakles-node-exporter* install.sh > SHA256SUMS
          (
            cd provenance
            sha256sum -- *.jsonl >> ../SHA256SUMS
          )
          (
            cd signature
            sha256sum -- *.json >> ../SHA256SUMS
          )

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          working_directory: release
          generate_release_notes: true
          files: |
            herakles-node-exporter*
            install.sh
            provenance/*.jsonl
            signature/*.json
            SHA256SUMS
