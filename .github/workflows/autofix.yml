name: Rust Autofix

on:
  schedule:
    - cron: "19 4 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: How to apply autofixes
        required: true
        default: pull_request
        type: choice
        options:
          - pull_request
          - commit
      fail-on-warnings:
        description: Fail if warnings remain after autofix
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: rust-autofix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    runs-on: ubuntu-latest
    env:
      AUTOFIX_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'pull_request' }}
      FAIL_ON_WARNINGS: ${{ github.event_name == 'workflow_dispatch' && inputs['fail-on-warnings'] || 'false' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Validate mode
        shell: bash
        run: |
          set -euo pipefail
          echo "AUTOFIX_MODE=${AUTOFIX_MODE}"
          echo "FAIL_ON_WARNINGS=${FAIL_ON_WARNINGS}"
          echo "github.ref_name=${{ github.ref_name }}"
          echo "default_branch=${{ github.event.repository.default_branch }}"
          if [[ "${AUTOFIX_MODE}" == "commit" && "${{ github.ref_name }}" == "${{ github.event.repository.default_branch }}" ]]; then
            echo "Refusing to auto-commit directly to the default branch."
            exit 1
          fi

      - name: Run Clippy autofix
        id: autofix
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          LOG_FILE="${RUNNER_TEMP}/clippy-autofix.log"
          {
            cargo clippy --fix --allow-dirty --allow-staged --lib --bins --examples --no-default-features
            cargo fmt --all
          } 2>&1 | tee "${LOG_FILE}"
          echo "log_file=${LOG_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Detect changes
        id: changes
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            echo "has_changes=false"
          else
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
            echo "has_changes=true"
          fi

      - name: Build PR body
        id: pr_body
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          BODY_FILE="${RUNNER_TEMP}/autofix-pr-body.md"
          LOG_FILE="${{ steps.autofix.outputs.log_file }}"
          {
            echo "Automated fixes generated by:"
            echo
            echo "- \`cargo clippy --fix --lib --bins --examples --no-default-features\`"
            echo "- \`cargo fmt --all\`"
            echo
            echo "Run: [${{ github.workflow }} #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo
            echo "<details>"
            echo "<summary>Clippy autofix report</summary>"
            echo
            echo '```text'
            if [[ -n "${LOG_FILE}" && -f "${LOG_FILE}" ]]; then
              tail -n 400 "${LOG_FILE}"
            else
              echo "No autofix log was captured."
            fi
            echo '```'
            echo "</details>"
          } > "${BODY_FILE}"
          echo "body_file=${BODY_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Commit autofixes to branch
        if: always() && steps.changes.outputs.has_changes == 'true' && env.AUTOFIX_MODE == 'commit'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply Rust autofixes"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Create autofix PR
        if: always() && steps.changes.outputs.has_changes == 'true' && env.AUTOFIX_MODE == 'pull_request'
        uses: peter-evans/create-pull-request@v7
        with:
          # Keep the branch name stable so repeated runs update the same autofix PR.
          branch: rust-autofix/${{ github.ref_name }}
          delete-branch: true
          commit-message: "Apply Rust autofixes"
          title: "Apply Rust autofixes"
          body-path: ${{ steps.pr_body.outputs.body_file }}

      - name: Report no changes
        if: always() && steps.changes.outputs.has_changes != 'true'
        run: echo "No autofixes were produced."

      - name: Verify remaining warnings
        if: always() && env.FAIL_ON_WARNINGS == 'true'
        run: cargo clippy --all-targets --no-default-features -- -D warnings

      - name: Fail if autofix command crashed
        if: always() && steps.autofix.outcome == 'failure' && steps.changes.outputs.has_changes != 'true'
        run: |
          echo "Clippy autofix failed before producing any changes."
          exit 1
