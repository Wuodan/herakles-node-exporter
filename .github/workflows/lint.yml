name: Rust Autofix PR

on:
  workflow_dispatch:
    inputs:
      fail-on-warnings:
        description: Fail if warnings remain after autofix
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Run Clippy autofix
        shell: bash
        run: |
          if [[ "${{ inputs.fail-on-warnings }}" == "true" ]]; then
            cargo clippy \
              --fix \
              --allow-dirty \
              --allow-staged \
              --no-default-features \
              -- -D warnings
          else
            cargo clippy \
              --fix \
              --allow-dirty \
              --allow-staged \
              --no-default-features
          fi

      - name: Format code
        run: cargo fmt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: rust-autofix
          delete-branch: true
          commit-message: "Apply Rust autofixes"
          title: "Apply Rust autofixes"
          body: |
            Automated fixes generated by:

            - cargo clippy --fix
            - cargo fmt