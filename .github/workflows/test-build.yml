name: Test

on:
  workflow_call:
    inputs:
      upload-release-binary:
        description: Upload the tested release binary as a workflow artifact.
        required: false
        type: boolean
        default: false
    outputs:
      release-binary-sha256-x86_64-linux-gnu:
        description: SHA-256 of the tested glibc release binary.
        value: ${{ jobs.build-and-test.outputs.release-binary-sha256-x86_64-linux-gnu }}
      release-binary-sha256-x86_64-linux-musl:
        description: SHA-256 of the tested musl release binary.
        value: ${{ jobs.build-and-test.outputs.release-binary-sha256-x86_64-linux-musl }}
  workflow_dispatch:
    inputs:
      upload-release-binary:
        description: Upload the tested release binary as a workflow artifact.
        required: false
        type: boolean
        default: false
  pull_request:
    branches-ignore:
      - lint-autofix/**
  push:
    branches-ignore:
      - lint-autofix/**

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust-target: x86_64-unknown-linux-gnu
            artifact-suffix: x86_64-linux-gnu
          - rust-target: x86_64-unknown-linux-musl
            artifact-suffix: x86_64-linux-musl
    runs-on: ubuntu-latest
    outputs:
      release-binary-sha256-x86_64-linux-gnu: ${{ steps.out-sha-x86_64-linux-gnu.outputs.sha256 }}
      release-binary-sha256-x86_64-linux-musl: ${{ steps.out-sha-x86_64-linux-musl.outputs.sha256 }}
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Test eBPF Binary
        uses: ./.github/actions/build-and-test
        with:
          rust-target: ${{ matrix.rust-target }}
          binary-path: ./target/${{ matrix.rust-target }}/release/herakles-node-exporter

      - name: Prepare release artifact bundle
        id: prepare-release-artifact-bundle
        if: ${{ inputs.upload-release-binary }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/${{ matrix.rust-target }}/release/herakles-node-exporter dist/herakles-node-exporter
          sha256sum dist/herakles-node-exporter > dist/herakles-node-exporter.sha256

      - name: Export release binary SHA (glibc)
        id: out-sha-x86_64-linux-gnu
        if: ${{ inputs.upload-release-binary && matrix.artifact-suffix == 'x86_64-linux-gnu' }}
        run: echo "sha256=$(awk '{print $1}' dist/herakles-node-exporter.sha256)" >> "$GITHUB_OUTPUT"

      - name: Export release binary SHA (musl)
        id: out-sha-x86_64-linux-musl
        if: ${{ inputs.upload-release-binary && matrix.artifact-suffix == 'x86_64-linux-musl' }}
        run: echo "sha256=$(awk '{print $1}' dist/herakles-node-exporter.sha256)" >> "$GITHUB_OUTPUT"

      - name: Generate build provenance attestation
        if: ${{ inputs.upload-release-binary }}
        uses: actions/attest@v4
        with:
          subject-path: dist/herakles-node-exporter

      - name: Upload tested release binary
        if: ${{ inputs.upload-release-binary }}
        uses: actions/upload-artifact@v4
        with:
          name: herakles-node-exporter-release-binary-${{ matrix.artifact-suffix }}
          path: |
            dist/herakles-node-exporter
            dist/herakles-node-exporter.sha256
          if-no-files-found: error
