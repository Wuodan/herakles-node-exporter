name: Test Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install bpftool
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libelf-dev \
            linux-tools-common \
            linux-tools-generic
          # Ensure bpftool is available
          if ! which bpftool; then
            BPFTOOL_PATH="$(find /usr/lib/linux-tools -type f -name bpftool | head -1)"
            test -n "$BPFTOOL_PATH" || { echo "bpftool not found"; exit 1; }
            sudo ln -sf "$BPFTOOL_PATH" /usr/local/bin/bpftool
          fi

      - name: Build with eBPF
        run: cargo build --release --features ebpf
