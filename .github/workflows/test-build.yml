name: Test Build

on:
  workflow_call:
    inputs:
      upload-release-binary:
        description: Upload the tested release binary as a workflow artifact.
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      upload-release-binary:
        description: Upload the tested release binary as a workflow artifact.
        required: false
        type: boolean
        default: false
  pull_request:
    branches-ignore:
      - lint-autofix/**
  push:
    branches-ignore:
      - lint-autofix/**

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  build-and-test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Test eBPF Binary
        uses: ./.github/actions/build-and-test

      - name: Prepare release artifact bundle
        if: ${{ inputs.upload-release-binary }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/herakles-node-exporter dist/herakles-node-exporter
          sha256sum dist/herakles-node-exporter > dist/herakles-node-exporter.sha256

      - name: Upload tested release binary
        if: ${{ inputs.upload-release-binary }}
        uses: actions/upload-artifact@v4
        with:
          name: herakles-node-exporter-release-binary
          path: |
            dist/herakles-node-exporter
            dist/herakles-node-exporter.sha256
          if-no-files-found: error
